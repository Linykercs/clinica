<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flávia Franco – Saúde Regenerativa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #dcdbd6; --taupe: #b5a594; --card-bg: #b5a594; --text-light: #f5f2ee; --input-bg: #ffffff; --label: #f0ece6; --btn-bg: #ffffff; --btn-text: #6b5e52; }
html, body { height: 100%; font-family: 'Raleway', sans-serif; background: var(--bg); }
.page { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.blob { position: absolute; background: var(--taupe); opacity: 0.92; z-index: 0; }
.blob--bl { width: 540px; height: 460px; bottom: -130px; left: -110px; border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
.blob--tr { width: 500px; height: 520px; top: -140px; right: -100px; border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%; }
.blob--tl { width: 280px; height: 310px; top: -90px; left: -70px; border-radius: 48% 52% 62% 38% / 42% 58% 42% 58%; }
.brand { position: absolute; top: 40px; left: 52px; z-index: 10; }
.brand__name { font-family: 'Raleway', sans-serif; font-size: 24px; font-weight: 500; letter-spacing: 0.18em; color: #5a4e44; text-transform: uppercase; }
.brand__sub { font-size: 12px; font-weight: 400; letter-spacing: 0.22em; color: #8a7a6e; text-transform: uppercase; margin-top: 5px; }
.card { position: relative; z-index: 10; background: var(--card-bg); border-radius: 4px; padding: 42px 40px 36px; width: 100%; max-width: 290px; box-shadow: 0 12px 48px rgba(0,0,0,0.18); animation: fadeUp 0.6s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
.card__title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--text-light); text-align: center; letter-spacing: 0.04em; margin-bottom: 28px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 400; letter-spacing: 0.08em; color: var(--label); margin-bottom: 6px; }
.field input { width: 100%; height: 34px; background: var(--input-bg); border: none; border-radius: 3px; padding: 0 10px; font-family: 'Raleway', sans-serif; font-size: 13px; color: #5a4e44; outline: none; }
.field input:focus { box-shadow: 0 0 0 2px rgba(255,255,255,0.45); }
.links { text-align: center; margin-top: 10px; margin-bottom: 22px; }
.links a { display: block; font-size: 10px; color: var(--label); text-decoration: none; line-height: 1.9; }
.btn { display: block; width: 100%; height: 36px; background: var(--btn-bg); border: none; border-radius: 3px; font-family: 'Raleway', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; color: var(--btn-text); text-transform: uppercase; cursor: pointer; }
.btn:hover { background: #f0ece6; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.erro-msg { display: none; text-align: center; margin-top: 12px; font-size: 11px; color: #ffe0e0; }
.erro-msg.visivel { display: block; }
</style>
</head>
<body>
<div class="page">
  <div class="blob blob--tl"></div>
  <div class="blob blob--bl"></div>
  <div class="blob blob--tr"></div>
  <div class="brand">
    <div class="brand__name">Flávia Franco</div>
    <div class="brand__sub">Saúde Regenerativa</div>
  </div>
  <div class="card">
    <h1 class="card__title">Acessar conta</h1>
    <div class="field">
      <label>E-MAIL</label>
      <input type="email" id="usuario" placeholder="admin@clinica.com"/>
    </div>
    <div class="field">
      <label>SENHA</label>
      <input type="password" id="senha"/>
    </div>
    <div class="links">
      <a href="home.html">← Voltar ao site</a>
    </div>
    <button class="btn" id="btnEntrar" onclick="fazerLogin()">Entrar</button>
    <p class="erro-msg" id="erroMsg"></p>
  </div>
</div>

<script>
const API_URL = "http://localhost:3000/api";

async function fazerLogin() {
  const email = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value;
  const btn   = document.getElementById("btnEntrar");
  const erro  = document.getElementById("erroMsg");

  if (!email || !senha) {
    erro.textContent = "Preencha e-mail e senha.";
    erro.classList.add("visivel");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Entrando...";
  erro.classList.remove("visivel");

  try {
    const res  = await fetch(`${API_URL}/admin/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || "Erro no login");
    localStorage.setItem("token_admin", data.token);
    localStorage.setItem("admin_nome", data.nome);
    window.location.href = "agendamentos.html";
  } catch (err) {
    erro.textContent = err.message;
    erro.classList.add("visivel");
    btn.disabled = false;
    btn.textContent = "Entrar";
  }
}

document.addEventListener("keydown", (e) => { if (e.key === "Enter") fazerLogin(); });
</script>
</body>
</html>
